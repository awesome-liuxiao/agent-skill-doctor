<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skill Doctor architecture</title>
  <desc id="desc">A simplified cosmic cartoon architecture showing skill files entering a local diagnostic core and leaving as portable reports.</desc>
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="5" orient="auto"><path d="M1 1l10 4-10 4" fill="none" stroke="#13203a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>.hand{font-family:"Comic Sans MS","Segoe Print",cursive}.ink{fill:#13203a}.small{font-size:16px;fill:#626d80}.pill{fill:#fffdf8;stroke:#13203a;stroke-width:2.5}</style>
  </defs>
  <rect width="1400" height="600" rx="28" fill="#fffaf0"/>
  <text x="60" y="70" class="ink hand" font-size="36" font-weight="700">a small, local universe</text>
  <text x="62" y="102" class="hand small">skill files go in · evidence-backed reports come out</text>
  <path d="M1080 56l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#ff725c"/><circle cx="1190" cy="72" r="6" fill="#8b73e8"/><path d="M1260 86q28-24 55 0" fill="none" stroke="#315fe8" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(90 195) rotate(-3)">
    <rect x="20" y="18" width="190" height="230" rx="22" fill="#dce7ff" stroke="#13203a" stroke-width="3"/>
    <rect x="0" y="0" width="190" height="230" rx="22" fill="#fffdf8" stroke="#13203a" stroke-width="3"/>
    <path d="M132 0l58 58h-58z" fill="#8b73e8" stroke="#13203a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M35 86h105M35 116h82M35 146h100" stroke="#315fe8" stroke-width="7" stroke-linecap="round"/>
    <text x="95" y="285" text-anchor="middle" class="ink hand" font-size="24" font-weight="700">skill files</text>
  </g>

  <path d="M330 315q78-56 162-5" fill="none" stroke="#13203a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(505 155)">
    <ellipse cx="300" cy="165" rx="300" ry="150" fill="#0a2147" stroke="#13203a" stroke-width="4"/>
    <ellipse cx="300" cy="165" rx="345" ry="65" fill="none" stroke="#315fe8" stroke-width="12" transform="rotate(-8 300 165)"/>
    <ellipse cx="300" cy="165" rx="345" ry="65" fill="none" stroke="#ff725c" stroke-width="4" transform="rotate(-8 300 165)" stroke-dasharray="3 19" stroke-linecap="round"/>
    <text x="300" y="105" text-anchor="middle" fill="#fffaf0" class="hand" font-size="31" font-weight="700">LOCAL DOCTOR</text>
    <text x="300" y="137" text-anchor="middle" fill="#bdc9df" class="hand" font-size="16">authenticated worker</text>
    <g transform="translate(90 180)"><rect width="130" height="58" rx="29" class="pill"/><text x="65" y="37" text-anchor="middle" class="ink hand" font-size="18" font-weight="700">static</text></g>
    <g transform="translate(235 180)"><rect width="130" height="58" rx="29" class="pill"/><text x="65" y="37" text-anchor="middle" class="ink hand" font-size="18" font-weight="700">evidence</text></g>
    <g transform="translate(380 180)"><rect width="130" height="58" rx="29" fill="#fff0c8" stroke="#13203a" stroke-width="2.5"/><text x="65" y="37" text-anchor="middle" class="ink hand" font-size="18" font-weight="700">sandbox*</text></g>
    <text x="445" y="266" text-anchor="middle" fill="#fffaf0" class="hand" font-size="14">*approval only</text>
  </g>

  <path d="M1130 315q65-48 132 0" fill="none" stroke="#13203a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(1190 205) rotate(3)">
    <rect width="160" height="220" rx="22" fill="#fffdf8" stroke="#13203a" stroke-width="3"/>
    <circle cx="80" cy="58" r="30" fill="#e0f5ec"/><path d="M63 58l12 12 24-29" fill="none" stroke="#13203a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="116" text-anchor="middle" class="ink hand" font-size="24" font-weight="700">reports</text>
    <text x="80" y="148" text-anchor="middle" class="hand small">terminal · JSON</text>
    <text x="80" y="174" text-anchor="middle" class="hand small">HTML · SARIF</text>
    <text x="80" y="200" text-anchor="middle" class="hand small">JUnit</text>
  </g>

  <g transform="translate(386 520)">
    <rect width="630" height="54" rx="27" fill="#eee8ff"/>
    <text x="315" y="35" text-anchor="middle" class="ink hand" font-size="18">local-first  ·  advisory-only  ·  evidence-linked</text>
  </g>
</svg>
