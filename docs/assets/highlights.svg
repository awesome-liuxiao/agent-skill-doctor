<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Why Agent Skill Doctor is trustworthy</title>
  <desc id="desc">Six concise cosmic cartoon cards for local-first analysis, evidence links, advisory-only findings, fail-closed behavior, explicit consent, and portable reports.</desc>
  <defs>
    <style>
      .ink{fill:#13203a}.hand{font-family:"Comic Sans MS","Segoe Print",cursive}.label{font-size:23px;font-weight:700}.note{font-size:15px;fill:#5a6477}.card{fill:#fffdf8;stroke:#13203a;stroke-width:3}.icon{fill:none;stroke:#13203a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1400" height="560" rx="28" fill="#fffaf0"/>
  <path d="M45 86 C300 32 501 117 751 68 S1130 33 1362 91" fill="none" stroke="#0a2147" stroke-width="44" stroke-linecap="round"/>
  <circle cx="1185" cy="61" r="5" fill="#ffd166"/><path d="M1290 86l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#ff725c"/>
  <text x="64" y="80" fill="#fffaf0" class="hand" font-size="34" font-weight="700">six small reasons to trust the answer</text>

  <g transform="translate(55 145) rotate(-1)">
    <rect width="400" height="150" rx="30" class="card"/>
    <circle cx="62" cy="62" r="34" fill="#dce7ff"/>
    <path d="M42 62a20 20 0 1 0 40 0 20 20 0 1 0-40 0m20-20v40M44 55h36M46 70h32" class="icon"/>
    <text x="112" y="58" class="ink hand label">Local-first</text>
    <text x="112" y="90" class="hand note">analysis stays on your machine</text>
    <path d="M113 101q92 10 194 0" fill="none" stroke="#315fe8" stroke-width="7" stroke-linecap="round" opacity=".45"/>
  </g>
  <g transform="translate(500 145) rotate(1)">
    <rect width="400" height="150" rx="30" class="card"/>
    <circle cx="62" cy="62" r="34" fill="#eee8ff"/>
    <path d="M43 67l15 15 27-35M43 43q20-15 39 1" class="icon"/>
    <text x="112" y="58" class="ink hand label">Evidence-linked</text>
    <text x="112" y="90" class="hand note">every finding shows its trail</text>
    <path d="M113 101q103-9 211 1" fill="none" stroke="#8b73e8" stroke-width="7" stroke-linecap="round" opacity=".45"/>
  </g>
  <g transform="translate(945 145) rotate(-1)">
    <rect width="400" height="150" rx="30" class="card"/>
    <circle cx="62" cy="62" r="34" fill="#ffe4de"/>
    <path d="M47 45h30v34H47zM53 53h18M53 61h13M53 69h16" class="icon"/>
    <text x="112" y="58" class="ink hand label">Advisory-only</text>
    <text x="112" y="90" class="hand note">recommends, never rewrites</text>
    <path d="M113 101q97 9 194-1" fill="none" stroke="#ff725c" stroke-width="7" stroke-linecap="round" opacity=".45"/>
  </g>

  <g transform="translate(55 345) rotate(1)">
    <rect width="400" height="150" rx="30" class="card"/>
    <circle cx="62" cy="62" r="34" fill="#e0f5ec"/>
    <path d="M62 39l22 9-3 23q-3 17-19 25-17-9-20-25l-2-23zM51 64l8 8 15-18" class="icon"/>
    <text x="112" y="58" class="ink hand label">Fail closed</text>
    <text x="112" y="90" class="hand note">uncertainty stays visible</text>
    <path d="M113 101q88-8 177 0" fill="none" stroke="#35a77b" stroke-width="7" stroke-linecap="round" opacity=".45"/>
  </g>
  <g transform="translate(500 345) rotate(-1)">
    <rect width="400" height="150" rx="30" class="card"/>
    <circle cx="62" cy="62" r="34" fill="#fff0c8"/>
    <path d="M62 42v40M42 62h40M48 48l28 28" class="icon"/>
    <text x="112" y="58" class="ink hand label">Explicit consent</text>
    <text x="112" y="90" class="hand note">runtime tests ask first</text>
    <path d="M113 101q89 9 183-1" fill="none" stroke="#f3ad29" stroke-width="7" stroke-linecap="round" opacity=".5"/>
  </g>
  <g transform="translate(945 345) rotate(1)">
    <rect width="400" height="150" rx="30" class="card"/>
    <circle cx="62" cy="62" r="34" fill="#e8e4ff"/>
    <path d="M45 43h34v40H45zM52 53h20M52 63h14M52 73h18" class="icon"/>
    <text x="112" y="58" class="ink hand label">Portable reports</text>
    <text x="112" y="90" class="hand note">one story, many formats</text>
    <path d="M113 101q101-8 204 1" fill="none" stroke="#725bd3" stroke-width="7" stroke-linecap="round" opacity=".45"/>
  </g>
</svg>
