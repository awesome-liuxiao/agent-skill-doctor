<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skill Doctor workflow</title>
  <desc id="desc">A simple five-step cosmic cartoon workflow: find, snapshot, analyze, optionally reproduce with approval, and explain.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M1 1l9 4-9 4" fill="none" stroke="#fffaf0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>.hand{font-family:"Comic Sans MS","Segoe Print",cursive}.ink{fill:#13203a}.step{font-size:22px;font-weight:700}.tiny{font-size:14px;fill:#5a6477}.orbit{fill:#fffdf8;stroke:#13203a;stroke-width:3}</style>
  </defs>
  <rect width="1400" height="520" rx="28" fill="#fffaf0"/>
  <text x="60" y="70" class="ink hand" font-size="36" font-weight="700">from “huh?” to a useful answer</text>
  <text x="62" y="102" class="hand" font-size="17" fill="#667085">a calm little trip through the evidence</text>
  <path d="M70 260 C250 174 406 333 588 248 S913 181 1088 261 1269 271 1340 225" fill="none" stroke="#0a2147" stroke-width="78" stroke-linecap="round"/>
  <path d="M90 257 C255 189 409 317 590 248 S913 196 1085 260 1261 267 1323 230" fill="none" stroke="#fffaf0" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 20" marker-end="url(#arrow)"/>
  <path d="M1214 103l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#ff725c"/><circle cx="1300" cy="130" r="7" fill="#8b73e8"/><circle cx="1050" cy="92" r="5" fill="#315fe8"/>

  <g transform="translate(155 236) rotate(-4)">
    <circle r="70" class="orbit"/><circle r="50" fill="#dce7ff"/>
    <path d="M-24-18h48v38h-48zM-15-8h30M-15 3h23M-15 14h27" fill="none" stroke="#13203a" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="104" text-anchor="middle" class="ink hand step">1 · Find</text>
  </g>
  <g transform="translate(420 270) rotate(3)">
    <circle r="70" class="orbit"/><circle r="50" fill="#eee8ff"/>
    <path d="M-23-20h42v48h-42zM-13-29h42v48M-13-8h25M-13 3h18M-13 14h23" fill="none" stroke="#13203a" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="104" text-anchor="middle" class="ink hand step">2 · Snapshot</text>
  </g>
  <g transform="translate(690 225) rotate(-2)">
    <circle r="78" class="orbit"/><circle r="56" fill="#ffe4de"/>
    <circle cx="-9" cy="-7" r="23" fill="none" stroke="#13203a" stroke-width="4"/><path d="M8 10l22 24" stroke="#13203a" stroke-width="5" stroke-linecap="round"/><path d="M-21-7h24M-9-19v24" stroke="#ff725c" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="114" text-anchor="middle" class="ink hand step">3 · Analyze</text>
  </g>
  <g transform="translate(970 268) rotate(3)">
    <circle r="70" class="orbit"/><circle r="50" fill="#fff0c8"/>
    <path d="M-27 6q27-42 54 0M-20 6v20h40V6M-8-10v-12h16v12" fill="none" stroke="#13203a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="104" text-anchor="middle" class="ink hand step">4 · Reproduce?</text>
    <text x="0" y="128" text-anchor="middle" class="hand tiny">only with approval</text>
  </g>
  <g transform="translate(1235 230) rotate(-3)">
    <circle r="70" class="orbit"/><circle r="50" fill="#e0f5ec"/>
    <path d="M-28-18h56v38h-33l-16 14 4-14h-11zM-16-7h33M-16 4h25" fill="none" stroke="#13203a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="142" text-anchor="middle" class="ink hand step">5 · Explain</text>
  </g>
  <path d="M120 450q42 15 84 0t84 0" fill="none" stroke="#315fe8" stroke-width="6" stroke-linecap="round" opacity=".7"/>
</svg>
