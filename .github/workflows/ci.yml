name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --requirement requirements-dev.lock
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src tests scripts
      - run: pytest -q --junitxml=validation-${{ matrix.platform }}.xml
      - name: Enforce public benchmark candidate gates
        run: >-
          python scripts/run_benchmark.py
          --manifest benchmarks/public/v1/manifest.json
          --causal benchmarks/public/v1/causal.json
          --known-escapes security/known-sandbox-escapes.json
          --junit validation-${{ matrix.platform }}.xml
          --platform ${{ matrix.platform }}
          --public-gate
          --output public-benchmark-${{ matrix.platform }}.json
      - run: python -m pip check
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: public-benchmark-${{ matrix.platform }}
          path: |
            validation-${{ matrix.platform }}.xml
            public-benchmark-${{ matrix.platform }}.json
          if-no-files-found: error
