name: Bug report
description: Report a reproducible defect using sanitized or synthetic evidence.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, private prompts, customer skills, or identifying absolute paths.
        Security-sensitive reports belong in GitHub private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0a1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Skill platform
      options: [Codex, Claude Code, Local directory only]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide the smallest synthetic skill and exact command that reproduce the defect.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and completed/missing coverage
    validations:
      required: true
  - type: checkboxes
    id: sanitation
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private prompts, customer data, and identifying paths.
          required: true
